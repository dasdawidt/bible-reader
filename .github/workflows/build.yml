name: Build
run-name: 'Build "${{ github.event.head_commit.message }}${{ github.event.pull_request.title }}" #${{ github.run_attempt }}'

on:
    pull_request:
        branches:
            - main
    push:
        paths-ignore:
            - '**.md'
            - '!src/**.md'
            - '!public/**.md'
        branches:
            - main

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 'latest'

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Install dependencies
              run: pnpm install

            - name: Run check
              run: pnpm run ci

            - name: Build project
              run: pnpm run build

            - name: Upload artifact
              if: github.event_name != 'pull_request'
              uses: actions/upload-artifact@v4
              with:
                  name: production-files
                  path: ./dist
                  include-hidden-files: true
